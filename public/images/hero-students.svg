<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient)" rx="20"/>
  
  <!-- Student figure -->
  <g transform="translate(200, 180)">
    <!-- Head -->
    <circle cx="0" cy="-80" r="25" fill="#ffb6b6"/>
    
    <!-- Body -->
    <rect x="-15" y="-55" width="30" height="60" fill="#4a90e2" rx="15"/>
    
    <!-- Arms -->
    <rect x="-35" y="-45" width="20" height="8" fill="#4a90e2" rx="4"/>
    <rect x="15" y="-45" width="20" height="8" fill="#4a90e2" rx="4"/>
    
    <!-- Hands -->
    <circle cx="-35" cy="-41" r="6" fill="#ffb6b6"/>
    <circle cx="35" cy="-41" r="6" fill="#ffb6b6"/>
    
    <!-- Legs -->
    <rect x="-12" y="5" width="8" height="40" fill="#2c3e50" rx="4"/>
    <rect x="4" y="5" width="8" height="40" fill="#2c3e50" rx="4"/>
    
    <!-- Feet -->
    <ellipse cx="-8" cy="45" rx="8" ry="4" fill="#34495e"/>
    <ellipse cx="8" cy="45" rx="8" ry="4" fill="#34495e"/>
    
    <!-- Eyes -->
    <circle cx="-8" cy="-85" r="3" fill="#2c3e50"/>
    <circle cx="8" cy="-85" r="3" fill="#2c3e50"/>
    
    <!-- Smile -->
    <path d="M -8 -75 Q 0 -70 8 -75" stroke="#2c3e50" stroke-width="2" fill="none"/>
    
    <!-- Hair -->
    <path d="M -20 -95 Q -10 -110 0 -105 Q 10 -110 20 -95" fill="#8b4513"/>
  </g>
  
  <!-- Books -->
  <g transform="translate(120, 200)">
    <!-- Book 1 -->
    <rect x="0" y="0" width="40" height="50" fill="url(#bookGradient)" rx="3"/>
    <rect x="2" y="2" width="36" height="46" fill="#fff" rx="2"/>
    <line x1="5" y1="15" x2="35" y2="15" stroke="#333" stroke-width="1"/>
    <line x1="5" y1="20" x2="30" y2="20" stroke="#333" stroke-width="1"/>
    <line x1="5" y1="25" x2="25" y2="25" stroke="#333" stroke-width="1"/>
    
    <!-- Book 2 -->
    <rect x="45" y="5" width="35" height="45" fill="#e74c3c" rx="3"/>
    <rect x="47" y="7" width="31" height="41" fill="#fff" rx="2"/>
    <line x1="50" y1="20" x2="75" y2="20" stroke="#333" stroke-width="1"/>
    <line x1="50" y1="25" x2="70" y2="25" stroke="#333" stroke-width="1"/>
    
    <!-- Book 3 -->
    <rect x="85" y="10" width="30" height="40" fill="#27ae60" rx="3"/>
    <rect x="87" y="12" width="26" height="36" fill="#fff" rx="2"/>
    <line x1="90" y1="25" x2="110" y2="25" stroke="#333" stroke-width="1"/>
  </g>
  
  <!-- Laptop -->
  <g transform="translate(280, 200)">
    <!-- Laptop base -->
    <rect x="0" y="20" width="60" height="40" fill="#34495e" rx="3"/>
    <!-- Laptop screen -->
    <rect x="5" y="5" width="50" height="35" fill="#2c3e50" rx="2"/>
    <rect x="7" y="7" width="46" height="31" fill="#ecf0f1" rx="1"/>
    
    <!-- Screen content -->
    <rect x="10" y="10" width="40" height="3" fill="#3498db"/>
    <rect x="10" y="15" width="35" height="2" fill="#95a5a6"/>
    <rect x="10" y="18" width="30" height="2" fill="#95a5a6"/>
    <rect x="10" y="21" width="25" height="2" fill="#95a5a6"/>
    
    <!-- Keyboard -->
    <rect x="10" y="25" width="40" height="12" fill="#bdc3c7" rx="1"/>
    <rect x="12" y="27" width="3" height="3" fill="#34495e" rx="1"/>
    <rect x="17" y="27" width="3" height="3" fill="#34495e" rx="1"/>
    <rect x="22" y="27" width="3" height="3" fill="#34495e" rx="1"/>
    <rect x="27" y="27" width="3" height="3" fill="#34495e" rx="1"/>
    <rect x="32" y="27" width="3" height="3" fill="#34495e" rx="1"/>
    <rect x="37" y="27" width="3" height="3" fill="#34495e" rx="1"/>
  </g>
  
  <!-- Floating elements -->
  <g transform="translate(50, 80)">
    <!-- Calculator -->
    <rect x="0" y="0" width="25" height="30" fill="#f39c12" rx="3"/>
    <rect x="2" y="2" width="21" height="26" fill="#fff" rx="2"/>
    <rect x="4" y="4" width="17" height="8" fill="#ecf0f1"/>
    <rect x="6" y="6" width="3" height="2" fill="#2c3e50"/>
    <rect x="11" y="6" width="3" height="2" fill="#2c3e50"/>
    <rect x="16" y="6" width="3" height="2" fill="#2c3e50"/>
    <rect x="6" y="9" width="3" height="2" fill="#2c3e50"/>
    <rect x="11" y="9" width="3" height="2" fill="#2c3e50"/>
    <rect x="16" y="9" width="3" height="2" fill="#2c3e50"/>
  </g>
  
  <!-- Pencil -->
  <g transform="translate(320, 100)">
    <rect x="0" y="0" width="4" height="25" fill="#e67e22" rx="2"/>
    <polygon points="0,0 4,0 2,8" fill="#2c3e50"/>
  </g>
  
  <!-- Coffee cup -->
  <g transform="translate(80, 120)">
    <ellipse cx="12" cy="15" rx="10" ry="8" fill="#fff" stroke="#95a5a6" stroke-width="2"/>
    <rect x="2" y="7" width="20" height="16" fill="#fff" stroke="#95a5a6" stroke-width="2" rx="10"/>
    <path d="M 22 12 Q 28 10 30 15" stroke="#95a5a6" stroke-width="2" fill="none"/>
    <ellipse cx="12" cy="10" rx="6" ry="3" fill="#8b4513"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="350" cy="50" r="8" fill="#e74c3c" opacity="0.7"/>
  <circle cx="30" cy="60" r="6" fill="#3498db" opacity="0.7"/>
  <circle cx="370" cy="120" r="5" fill="#f39c12" opacity="0.7"/>
  <circle cx="20" cy="200" r="7" fill="#27ae60" opacity="0.7"/>
</svg> 